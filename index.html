<script>
const P=JSON.parse(document.getElementById('payload').textContent);
const f=document.getElementById('f'),pwi=document.getElementById('pw'),er=document.getElementById('e'),b=document.getElementById('b');
function u8(s){const x=atob(s),a=new Uint8Array(x.length);for(let i=0;i<x.length;i++)a[i]=x.charCodeAt(i);return a;}
async function decrypt(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:u8(P.salt),iterations:P.iter,hash:'SHA-256'},km,{name:'AES-CBC',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-CBC',iv:u8(P.iv)},key,u8(P.ct));
  return new TextDecoder().decode(pt);
}
async function reveal(pw,remember){
  const html=await decrypt(pw);
  if(remember){try{sessionStorage.setItem('cv_pw',pw);}catch(e){}}
  document.open();document.write(html);document.close();
}
f.addEventListener('submit',async ev=>{
  ev.preventDefault();er.textContent='';b.disabled=true;b.textContent='Проверка…';
  try{await reveal(pwi.value.trim(),true);}
  catch(e){er.textContent='Неверный пароль';b.disabled=false;b.textContent='Открыть';pwi.select();}
});
(async()=>{try{const s=sessionStorage.getItem('cv_pw');if(s){await reveal(s,false);}}catch(e){}})();
</script></body></html>
